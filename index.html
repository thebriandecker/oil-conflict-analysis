<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #0d1117; color: #e6edf3; font-family: 'JetBrains Mono', monospace; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

  @keyframes barGrow { from { width: 0; } }

function StatBox({ label, value, sub, accent }) {
  return (
    <div style={{ background: C.cardAlt, border: `1px solid ${C.border}`, borderTop: `3px solid ${accent}`, padding: "16px 18px", flex: 1, minWidth: 180 }}>
      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: C.muted, letterSpacing: 2, marginBottom: 6, textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 34, fontWeight: 700, color: accent, lineHeight: 1 }}>{value}</div>
      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: C.dim, marginTop: 6, lineHeight: 1.4 }}>{sub}</div>
    </div>
  );
}

function OilBar({ width, color, delay }) {
  const [show, setShow] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const t = setTimeout(() => setShow(true), delay || 0);
    return () => clearTimeout(t);
  }, [delay]);
  return (
    <div style={{ height: 6, borderRadius: 3, background: `${color}22`, width: "100%", overflow: "hidden" }}>
      <div style={{
        height: "100%", borderRadius: 3,
        background: `linear-gradient(90deg, ${color}, ${color}88)`,
        width: show ? `${Math.min(width, 100)}%` : "0%",
        transition: "width 0.8s ease",
      }} />
    </div>
  );
}

              { l: "BRENT", v: "$79.07", ch: "+8.51%" },

          if (tab === 2) return (
            <div className="fade-up" key="t2">
              <SH num="03" title={<>ENTRY TIMING <span style={{ color: C.teal }}>FRAMEWORK</span></>} sub="5 PHASES · PROBABILISTIC ENTRY WINDOWS · 4TH INDUSTRIAL REVOLUTION" />

              <div style={{ position: "relative" }}>
                <div style={{ position: "absolute", left: 23, top: 0, bottom: 0, width: 2, background: `linear-gradient(180deg, ${C.muted}44, ${C.green}44)`, zIndex: 0 }} />
                {phases.map((p, i) => (
                  <div key={i} style={{ position: "relative", zIndex: 1, marginBottom: 3 }}>
                    <div style={{
                      position: "absolute", left: 16, top: 18, width: 16, height: 16, borderRadius: "50%",
                      background: C.bg, border: `3px solid ${p.c}`, zIndex: 2,
                      boxShadow: i === 0 ? `0 0 10px ${p.c}55` : "none",
                    }} />
                    <div style={{ marginLeft: 46 }}>
                      <div style={{
                        display: "flex", gap: 0, background: C.card, border: `1px solid ${C.border}`,
                        borderLeft: `4px solid ${p.c}`, overflow: "hidden",
                      }}>
                        <div style={{ width: 48, display: "flex", alignItems: "center", justifyContent: "center", borderRight: `1px solid ${C.border}`, flexShrink: 0 }}>
                          <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 20, fontWeight: 700, color: p.c }}>{p.id}</span>
                        </div>
                        <div style={{ flex: 1, padding: "12px 16px" }}>
                          <div className="phase-card-inner" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
                            <div>
                              <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 18, fontWeight: 600, color: C.white }}>{p.name}</div>
                              <div style={{ fontSize: 10, color: C.muted, marginTop: 1 }}>{p.tl} · {p.dt}</div>
                            </div>
                            <div className="phase-actions" style={{ display: "flex", gap: 10, alignItems: "center" }}>
                              <div style={{ textAlign: "right" }}>
                                <div style={{ fontSize: 10, color: C.dim }}>OIL</div>
                                <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 16, fontWeight: 600, color: C.orange }}>{p.oil}</div>
                              </div>
                              <div style={{ background: `${p.ac}15`, border: `1px solid ${p.ac}44`, padding: "3px 10px", borderRadius: 2 }}>
                                <span style={{ fontSize: 11, fontWeight: 700, color: p.ac, letterSpacing: 1 }}>{p.act}</span>
                              </div>
                            </div>
                          </div>
                          <div style={{ fontSize: 11, color: C.muted, marginTop: 8, lineHeight: 1.5 }}>{p.desc}</div>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Optimal entry zone */}
              <div style={{
                background: `linear-gradient(135deg, ${C.green}0a, ${C.teal}06)`,
                border: `1px solid ${C.green}33`, padding: "18px 20px", marginTop: 20,
              }}>
                <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 20, fontWeight: 700, color: C.green, marginBottom: 8 }}>
                  ⎯ OPTIMAL ENTRY ZONE: MARCH 14 – APRIL 4 ⎯
                </div>
                <div style={{ fontSize: 12, color: C.muted, lineHeight: 1.7 }}>
                  History says the equity bottom comes within ~30 days of conflict start (Feb 28). Monitor: <span style={{ color: C.white }}>VIX &gt; 28</span>, <span style={{ color: C.white }}>SMH/SOXX -7% to -10%</span>, Hormuz reopening signals, Trump-Iran negotiation headlines.
                  <span style={{ color: C.green, fontWeight: 600 }}> ISM at 52.4 provides a fundamental floor.</span>
                </div>
              </div>

              {/* Tickers */}
              <div style={{ marginTop: 18, display: "flex", gap: 6, flexWrap: "wrap" }}>
                {["NVDA", "AVGO", "SMH", "SOXX", "VRT", "PLTR", "ISRG", "PWR", "AMD", "EQIX"].map((t, i) => (
                  <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, padding: "5px 12px", fontSize: 11, fontWeight: 600, color: C.teal, letterSpacing: 1 }}>{t}</div>
                ))}
                <div style={{ padding: "5px 12px", fontSize: 10, color: C.dim, display: "flex", alignItems: "center" }}>← 4IR targets</div>
              </div>
            </div>
          );

          /* === TAB 3: RECOVERY TIMELINE === */
          if (tab === 3) return (
            <div className="fade-up" key="t3">
              <SH num="04" title={<>RECOVERY <span style={{ color: C.green }}>TIMELINE</span></>} sub="SCENARIO-WEIGHTED RETURN ESTIMATES · S&P 500 & SEMICONDUCTORS" />

              {recoveryData.map((r, i) => (
                <div key={i} style={{
                  background: C.card, border: `1px solid ${C.border}`, borderLeft: `4px solid ${r.c}`,
                  padding: "18px 20px", marginBottom: 6,
                }}>
                  <div className="recovery-header" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
                    <div>
                      <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 20, fontWeight: 700, color: C.white }}>{r.scenario}</div>
                      <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{r.sub}</div>
                    </div>
                    <div className="recovery-returns" style={{ display: "flex", gap: 18 }}>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 9, color: C.dim, letterSpacing: 1, marginBottom: 3 }}>S&P 500</div>
                        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 24, fontWeight: 700, color: r.c }}>{r.sp}</div>
                        <div style={{ fontSize: 9, color: C.dim }}>6-mo return</div>
                      </div>
                      <div style={{ width: 1, background: C.border }} />
                      <div style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 9, color: C.dim, letterSpacing: 1, marginBottom: 3 }}>SMH/SEMIS</div>
                        <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 24, fontWeight: 700, color: C.teal }}>{r.smh}</div>
                        <div style={{ fontSize: 9, color: C.dim }}>6-mo return</div>
                      </div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 20, marginTop: 14, flexWrap: "wrap" }}>
                    <div>
                      <div style={{ fontSize: 9, color: C.dim, letterSpacing: 1, marginBottom: 2 }}>TIME TO BOTTOM</div>
                      <div style={{ fontSize: 12, color: C.white, fontWeight: 500 }}>{r.bottom}</div>
                    </div>
                    <div>
                      <div style={{ fontSize: 9, color: C.dim, letterSpacing: 1, marginBottom: 2 }}>RECOVERY PATH</div>
                      <div style={{ fontSize: 12, color: C.white, fontWeight: 500 }}>{r.recovery}</div>
                    </div>
                  </div>
                </div>
              ))}

              <div className="stat-row" style={{ marginTop: 24, display: "flex", gap: 14, flexWrap: "wrap" }}>
                <StatBox label="WELLS FARGO BASE" value="7,500" sub="S&P 500 year-end 2026 (~9% upside)" accent={C.green} />
                <StatBox label="WELLS FARGO WORST" value="6,000" sub="Sustained $100+ oil (−13%)" accent={C.red} />
                <StatBox label="GOLDMAN OIL 4Q" value="$60" sub="WTI normalizes if short-lived" accent={C.teal} />
              </div>

              {/* Final callout */}
              <div style={{
                marginTop: 24, padding: "20px",
                background: `linear-gradient(135deg, ${C.orange}0c, ${C.green}06)`,
                border: `1px solid ${C.orange}33`,
              }}>
                <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 18, fontWeight: 700, color: C.orange, marginBottom: 8 }}>
                  OXFORD ECONOMICS / ALPINE MACRO
                </div>
                <div style={{ fontSize: 12, color: C.muted, lineHeight: 1.7 }}>
                  "Sell any extreme moves in oil, energy, defense — these will fade. If growth assets fall sharply on war fears, <span style={{ color: C.green, fontWeight: 700 }}>buy the dip</span>. The conflict will not last beyond two months."
                </div>
                <div style={{ marginTop: 14, display: "flex", gap: 10, flexWrap: "wrap" }}>
                  {[
                    { t: "AFTER GULF WAR: S&P +16%", c: C.green },
                    { t: "AFTER IRAQ: S&P +14%", c: C.green },
                    { t: "SEMIS POST-CONFLICT: +20–40%", c: C.teal },
                  ].map((b, i) => (
                    <div key={i} style={{ background: `${b.c}12`, border: `1px solid ${b.c}33`, padding: "7px 14px" }}>
                      <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 700, color: b.c }}>{b.t}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        })()}

        {/* FOOTER */}
        <div style={{ marginTop: 48, paddingTop: 16, borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
          <div style={{ fontSize: 9, color: C.dim, lineHeight: 1.6 }}>
            * WTI/Brent crude oil. % moves measured peak-to-trough. Not financial advice. Educational purposes only.<br />
            Sources: Goldman Sachs, Wells Fargo, Citi, Oxford Economics, ISM, Bloomberg, Reuters, Barclays, Wood Mackenzie.
          </div>
          <div style={{ fontSize: 9, color: C.dim }}>THE WEALTH SOCIETY © 2026</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
